<!DOCTYPE html>
<html lang="en" class="light">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CourtSync Login</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <!-- DARK MODE CONFIG -->
  <script>
    tailwind.config = {
      darkMode: 'class'
    }
  </script>

  <!-- TOAST STYLES -->
  <style>
    .toast {
      transform: translateX(100%);
      opacity: 0;
      transition: all 0.4s ease;
    }

    .toast.show {
      transform: translateX(0);
      opacity: 1;
    }

    .toast.hide {
      transform: translateX(100%);
      opacity: 0;
    }
  </style>
</head>

<body class="bg-gray-100 dark:bg-gray-900 transition duration-300">

  <!-- THEME TOGGLE (UPDATED FOR MOBILE SPACING) -->
  <div class="absolute top-3 right-3 sm:top-4 sm:right-4 flex items-center gap-2 px-3 py-1.5 rounded-full bg-white/70 dark:bg-gray-800/70 backdrop-blur-md shadow-md">
    <span id="modeLabel" class="text-sm text-gray-700 dark:text-gray-300">Light</span>
    <button id="themeToggle" class="w-14 h-8 flex items-center bg-gray-300 dark:bg-green-500 rounded-full p-1 transition duration-300">
      <div id="toggleCircle" class="bg-white w-6 h-6 rounded-full shadow-md transform transition duration-300"></div>
    </button>
  </div>

  <div class="min-h-screen flex items-center justify-center p-4">

    <div class="flex flex-col md:flex-row w-full max-w-5xl bg-white dark:bg-gray-800 rounded-3xl shadow-lg overflow-hidden" style="margin-top:50px">

      <!-- IMAGE -->
      <div class="w-full md:w-1/2 h-60 md:h-auto">
        <img src="https://i.pinimg.com/1200x/72/ab/4d/72ab4d70e1a47fc25e8b5da4ce40a9e6.jpg" class="w-full h-full object-cover">
      </div>

      <!-- LOGIN FORM -->
      <div class="w-full md:w-1/2 p-6 sm:p-8 md:p-12">
        <h2 class="text-2xl font-bold text-gray-800 dark:text-white mb-2">Welcome Back 👋</h2>
        <p class="text-gray-600 dark:text-gray-300 mb-6 text-sm">Login to manage your pickleball bookings</p>

        <form id="loginForm" class="space-y-5">
          <!-- EMAIL -->
          <div>
            <label class="text-sm text-gray-700 dark:text-gray-300">Email</label>
            <input id="email" type="email" required placeholder="you@example.com" class="w-full mt-1 px-4 py-2 border rounded-xl focus:ring-2 focus:ring-green-400 focus:outline-none bg-white dark:bg-gray-700 text-gray-800 dark:text-white placeholder-gray-400 dark:placeholder-gray-300">
          </div>

          <!-- PASSWORD -->
          <div>
            <label class="text-sm text-gray-700 dark:text-gray-300">Password</label>
            <input id="password" type="password" required placeholder="••••••••" class="w-full mt-1 px-4 py-2 border rounded-xl focus:ring-2 focus:ring-green-400 focus:outline-none bg-white dark:bg-gray-700 text-gray-800 dark:text-white placeholder-gray-400 dark:placeholder-gray-300">
          </div>

          <!-- LOGIN BUTTON -->
          <button id="loginBtn" type="submit" class="w-full bg-green-500 hover:bg-green-600 text-white py-2.5 rounded-xl transition">
            Login
          </button>
        </form>

        <!-- DIVIDER -->
        <div class="my-6 flex items-center">
          <div class="flex-grow border-t dark:border-gray-600"></div>
          <span class="mx-3 text-gray-400 text-sm">OR</span>
          <div class="flex-grow border-t dark:border-gray-600"></div>
        </div>

        <!-- GOOGLE LOGIN -->
        <button id="googleLogin" class="w-full flex items-center justify-center gap-2 border py-2.5 rounded-xl hover:bg-gray-100 dark:hover:bg-gray-700 transition text-gray-700 dark:text-white">
          <img src="https://www.svgrepo.com/show/475656/google-color.svg" class="w-5 h-5">
          Login with Google
        </button>
      </div>
    </div>
  </div>

  <!-- TOAST CONTAINER -->
  <div id="toastContainer" class="fixed bottom-5 right-5 space-y-3 z-50"></div>

  <!-- FIREBASE + LOGIC -->
  <script type="module">
    import {
      initializeApp
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
      getAuth,
      signInWithEmailAndPassword,
      GoogleAuthProvider,
      signInWithPopup
    }
    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDC93Rb5iOeAhiCfqTxYYt7J5luOxuq7eA",
      authDomain: "courtsync-fb300.firebaseapp.com",
      projectId: "courtsync-fb300",
      storageBucket: "courtsync-fb300.firebasestorage.app",
      messagingSenderId: "904519208033",
      appId: "1:904519208033:web:90adce7eb02203bd112e20",
      measurementId: "G-Q8B46L2CCR"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    function showToast(message, isError = false) {
      const container = document.getElementById("toastContainer");
      const toast = document.createElement("div");
      toast.className = `
        toast flex items-center justify-between gap-4 px-5 py-3 rounded-xl shadow-lg text-sm min-w-[250px]
        ${isError ? "bg-red-500 text-white" : "bg-gray-900 text-white"}
      `;
      toast.innerHTML = `<span>${message}</span><button class="text-white font-bold">✕</button>`;
      container.appendChild(toast);

      setTimeout(() => toast.classList.add("show"), 10);
      toast.querySelector("button").addEventListener("click", () => hideToast(toast));
      setTimeout(() => hideToast(toast), 3000);
    }

    function hideToast(toast) {
      toast.classList.remove("show");
      toast.classList.add("hide");
      setTimeout(() => toast.remove(), 400);
    }

    const form = document.getElementById("loginForm");
    const btn = document.getElementById("loginBtn");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      btn.innerText = "Logging in...";
      btn.disabled = true;

      try {
        await signInWithEmailAndPassword(auth, email, password);
        showToast("Login successful!");
        setTimeout(() => window.location.href = "../Pages/dashboard.html", 1500);
      } catch (error) {
        showToast(error.message, true);
      }

      btn.innerText = "Login";
      btn.disabled = false;
    });

    document.getElementById("googleLogin").addEventListener("click", async () => {
      try {
        await signInWithPopup(auth, provider);
        showToast("Google login successful!");
        setTimeout(() => window.location.href = "../Pages/dashboard.html", 1500);
      } catch (error) {
        showToast(error.message, true);
      }
    });

    const toggle = document.getElementById("themeToggle");
    const circle = document.getElementById("toggleCircle");
    const label = document.getElementById("modeLabel");
    const html = document.documentElement;

    function setDarkMode(isDark) {
      if (isDark) {
        html.classList.add("dark");
        circle.classList.add("translate-x-6");
        toggle.classList.remove("bg-gray-300");
        toggle.classList.add("bg-green-500");
        label.innerText = "Dark";
        localStorage.setItem("theme", "dark");
      } else {
        html.classList.remove("dark");
        circle.classList.remove("translate-x-6");
        toggle.classList.add("bg-gray-300");
        toggle.classList.remove("bg-green-500");
        label.innerText = "Light";
        localStorage.setItem("theme", "light");
      }
    }

    const savedTheme = localStorage.getItem("theme");
    setDarkMode(savedTheme === "dark");

    toggle.addEventListener("click", () => {
      setDarkMode(!html.classList.contains("dark"));
    });
  </script>
</body>

</html>
