<!DOCTYPE html>
<html lang="en" class="dark">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#111827">
  <title>CourtSync Login</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class'
    }
  </script>

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Inter', sans-serif;
    }

    .toast {
      opacity: 0;
      transform: translateY(20px);
      transition: all 0.4s ease;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }
  </style>
</head>

<body id="body" class="bg-gradient-to-br from-gray-900 via-gray-800 to-gray-900 text-white min-h-screen flex items-center justify-center px-4 transition-all duration-300">

  <!-- Toggle Switch -->
  <div class="absolute top-5 right-5 flex items-center gap-2">
    <span class="text-sm">🌙</span>

    <button id="themeToggle" class="w-14 h-7 flex items-center bg-gray-600 rounded-full p-1 transition">

      <div id="toggleCircle" class="bg-white w-5 h-5 rounded-full shadow-md transform transition">
      </div>
    </button>

    <span class="text-sm">☀️</span>
  </div>

  <!-- Card -->
  <div class="w-full max-w-md bg-white/10 backdrop-blur-xl border border-white/20 rounded-2xl p-6 sm:p-8 shadow-2xl">

    <h1 class="text-3xl font-semibold text-center mb-1">CourtSync</h1>
    <p class="text-center text-gray-300 mb-6 text-sm">Sign in to your account</p>

    <!-- Email -->
    <input id="email" type="email" placeholder="Email" class="w-full mb-4 px-4 py-3 rounded-xl bg-white/10 border border-white/20 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500">

    <!-- Password -->
    <div class="relative mb-4">
      <input id="password" type="password" placeholder="Password" class="w-full px-4 py-3 rounded-xl bg-white/10 border border-white/20 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500">

      <button id="togglePassword" class="absolute right-4 top-3 text-gray-300">

        <!-- Eye Open -->
        <svg id="eyeOpen" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0" />
          <path stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5
          c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7
          -4.477 0-8.268-2.943-9.542-7z" />
        </svg>

        <!-- Eye Closed -->
        <svg id="eyeClosed" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 hidden" viewBox="0 0 24 24" stroke="currentColor" fill="none">
          <path stroke-width="2" d="M3 3l18 18M10.584 10.587a2 2 0 002.828 2.828M9.88 5.09A9.953 9.953 0 0112 5
          c4.478 0 8.268 2.943 9.542 7a9.97 9.97 0 01-2.042 3.362M6.1 6.1A9.96 9.96 0 002.458 12
          c1.274 4.057 5.064 7 9.542 7a9.95 9.95 0 005.312-1.53" />
        </svg>

      </button>
    </div>

    <!-- Login -->
    <button id="loginBtn" class="w-full bg-blue-600 hover:bg-blue-700 py-3 rounded-xl font-medium mb-4">
      Sign In
    </button>

    <!-- Divider -->
    <div class="flex items-center my-5">
      <div class="flex-grow h-px bg-white/20"></div>
      <span class="px-3 text-sm text-gray-400">OR</span>
      <div class="flex-grow h-px bg-white/20"></div>
    </div>

    <!-- Google -->
    <button id="googleLogin" class="w-full flex items-center justify-center gap-3 bg-white text-gray-800 py-3 rounded-xl hover:bg-gray-200">

      <!-- Google Logo -->
      <svg viewBox="0 0 48 48" class="w-5 h-5">
        <path fill="#EA4335" d="M24 9.5c3.5 0 6.7 1.2 9.2 3.6l6.9-6.9C35.9 2.5 30.4 0 24 0 14.8 0 6.8 5.5 2.8 13.5l8 6.2C12.7 13.2 17.9 9.5 24 9.5z" />
        <path fill="#4285F4" d="M46.5 24c0-1.6-.1-2.8-.4-4H24v7.5h12.7c-.3 2-1.7 5-4.7 7l7.3 5.7c4.2-3.9 6.2-9.6 6.2-16.2z" />
        <path fill="#FBBC05" d="M10.8 28.7c-1-2.9-1-6 0-8.9l-8-6.2C.9 17.2 0 20.5 0 24s.9 6.8 2.8 10.4l8-5.7z" />
        <path fill="#34A853" d="M24 48c6.5 0 11.9-2.1 15.8-5.8l-7.3-5.7c-2 1.4-4.7 2.4-8.5 2.4-6.1 0-11.3-3.7-13.2-8.9l-8 5.7C6.8 42.5 14.8 48 24 48z" />
      </svg>

      Continue with Google
    </button>
  </div>

  <!-- Toast -->
  <div id="toast" class="toast fixed bottom-5 right-5 px-5 py-3 rounded-xl shadow-lg flex items-center gap-4 text-white">

    <span id="toastMsg"></span>
    <button id="closeToast">✖</button>
  </div>

  <!-- Firebase -->
  <script type="module">
    import {
      initializeApp
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import {
      getAuth,
      signInWithEmailAndPassword,
      GoogleAuthProvider,
      signInWithPopup
    }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDC...",
      authDomain: "courtsync-fb300.firebaseapp.com",
      projectId: "courtsync-fb300",
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    const showToast = (msg, error = false) => {
      const toast = document.getElementById("toast");
      const msgEl = document.getElementById("toastMsg");

      msgEl.textContent = msg;
      toast.style.background = error ? "#ef4444" : "#22c55e";

      toast.classList.add("show");

      setTimeout(() => {
        toast.classList.remove("show");
      }, 3000);
    };

    document.getElementById("closeToast").onclick = () => {
      document.getElementById("toast").classList.remove("show");
    };

    loginBtn.onclick = () => {
      signInWithEmailAndPassword(auth, email.value, password.value)
        .then(() => showToast("Login successful"))
        .catch(e => showToast(e.message, true));
    };

    const provider = new GoogleAuthProvider();

    googleLogin.onclick = () => {
      signInWithPopup(auth, provider)
        .then(() => showToast("Google login successful"))
        .catch(e => showToast(e.message, true));
    };
  </script>

  <!-- UI Logic -->
  <script>
    const html = document.documentElement;
    const toggleBtn = document.getElementById("themeToggle");
    const circle = document.getElementById("toggleCircle");

    // Load saved theme
    if (localStorage.getItem("theme") === "light") {
      html.classList.remove("dark");
      document.body.classList.remove("bg-gray-900", "text-white");
      document.body.classList.add("bg-gray-100", "text-gray-900");
      circle.classList.add("translate-x-7");
    }

    toggleBtn.onclick = () => {
      html.classList.toggle("dark");

      if (html.classList.contains("dark")) {
        localStorage.setItem("theme", "dark");
        circle.classList.remove("translate-x-7");
        document.body.className = "bg-gradient-to-br from-gray-900 via-gray-800 to-gray-900 text-white min-h-screen flex items-center justify-center px-4";
      } else {
        localStorage.setItem("theme", "light");
        circle.classList.add("translate-x-7");
        document.body.className = "bg-gray-100 text-gray-900 min-h-screen flex items-center justify-center px-4";
      }
    };

    // Password toggle
    togglePassword.onclick = () => {
      if (password.type === "password") {
        password.type = "text";
        eyeOpen.classList.add("hidden");
        eyeClosed.classList.remove("hidden");
      } else {
        password.type = "password";
        eyeOpen.classList.remove("hidden");
        eyeClosed.classList.add("hidden");
      }
    };
  </script>

  <script>
    let deferredPrompt;

    window.addEventListener("beforeinstallprompt", (e) => {
      e.preventDefault();
      deferredPrompt = e;

      console.log("App can be installed");
    });

    async function installApp() {
      if (!deferredPrompt) return;

      deferredPrompt.prompt();
      const {
        outcome
      } = await deferredPrompt.userChoice;

      console.log("User response:", outcome);
      deferredPrompt = null;
    }
  </script>

</body>

</html>
